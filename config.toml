baseURL = "https://ethwei.com/"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
disableKinds = ["taxonomy", "term", "RSS"]
enableRobotsTXT = true

[params]
  description = "Ethwei is a Layer 1 blockchain purpose-engineered for real world asset tokenization. Bring property, commodities, credit, and equity on-chain with enterprise-grade security."

[languages]
  [languages.en]
    label = "English"
    locale = "en"
    weight = 1
    title = "Ethwei - Simple. Secure. Decentralized."
    [languages.en.params]
      description = "Ethwei is a Layer 1 blockchain purpose-engineered for real world asset tokenization. Bring property, commodities, credit, and equity on-chain with enterprise-grade security."

  [languages.zh]
    label = "中文"
    locale = "zh-Hans"
    weight = 2
    title = "以太维 Ethwei - 简单 · 安全 · 去中心化"
    [languages.zh.params]
      description = "以太维（Ethwei）是一条专为现实世界资产代币化打造的 Layer 1 区块链，以企业级安全将房产、大宗商品、信贷与股权带上链。"

  [languages.kr]
    label = "한국어"
    locale = "ko"
    weight = 3
    title = "이더웨이 Ethwei - 단순 · 안전 · 탈중앙화"
    [languages.kr.params]
      description = "이더웨이(Ethwei)는 실물자산 토큰화를 위해 설계된 레이어 1 블록체인입니다. 부동산, 원자재, 신용, 지분을 엔터프라이즈급 보안으로 온체인에 올립니다."

  [languages.ja]
    label = "日本語"
    locale = "ja"
    weight = 4
    title = "イーサウェイ Ethwei - シンプル · セキュア · 分散型"
    [languages.ja.params]
      description = "イーサウェイ（Ethwei）は現実資産のトークン化のために設計されたレイヤー1ブロックチェーンです。不動産、コモディティ、クレジット、エクイティをエンタープライズグレードのセキュリティでオンチェーンに。"
