{{ $curLang := .Site.Language.Lang }}
{{ $homeURL := cond (eq $curLang "en") "/" (printf "/%s/" $curLang) }}
<header class="site">
  <a href="{{ $homeURL }}" aria-label="Ethwei home"><img src="/images/logo.png" alt="Ethwei" class="logo" /></a>

  <span class="spacer"></span>

  <nav class="main">
    <a href="/blog/">{{ T "nav_blog" }}</a>
  </nav>

  <div class="lang">
    {{ range hugo.Sites }}
      <a href="{{ .Home.RelPermalink }}"{{ if eq .Language.Lang $curLang }} class="active"{{ end }}>{{ .Language.Label }}</a>
    {{ end }}
  </div>

  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark and light mode">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</header>
