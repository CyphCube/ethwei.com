{{ define "main" }}
<main class="post">
  <a href="/blog/" class="back">{{ T "back_to_blog" }}</a>
  <span class="category">{{ .Params.category | default "Article" }}</span>
  <h1>{{ .Title }}</h1>
  <p class="meta">{{ .Date.Format "January 2, 2006" }}</p>
  {{ with .Params.image }}
  <img src="{{ . }}" alt="" class="hero-img" />
  {{ end }}
  <article>{{ .Content }}</article>
</main>
{{ end }}
