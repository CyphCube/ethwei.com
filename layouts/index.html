{{ define "main" }}
<main>
  <section class="hero">
    <h1 class="hero-title">{{ T "hero_title" }}</h1>
    <p class="hero-sub">{{ T "hero_sub" }}</p>

    <div class="hero-video">
      {{/* Drop the hero <video> here when ready, e.g.:
      <video src="/videos/hero.mp4" autoplay muted loop playsinline poster="/images/hero-poster.jpg"></video> */}}
      <div class="video-placeholder">
        <span class="play">&#9654;</span>
        <span>{{ T "video_soon" }}</span>
      </div>
    </div>

    <p class="testnet">{{ T "testnet" }}</p>
  </section>

  <section class="features">
    <div class="feature">
      <h3>{{ T "feat_simple_title" }}</h3>
      <p>{{ T "feat_simple_desc" }}</p>
    </div>
    <div class="feature">
      <h3>{{ T "feat_secure_title" }}</h3>
      <p>{{ T "feat_secure_desc" }}</p>
    </div>
    <div class="feature">
      <h3>{{ T "feat_decentral_title" }}</h3>
      <p>{{ T "feat_decentral_desc" }}</p>
    </div>
  </section>
</main>
{{ end }}
